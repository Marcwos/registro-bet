# ─── Configuración de SonarCloud ────────────────────────────
# Este archivo le dice a SonarCloud:
#   - Qué proyecto es (key + organización)
#   - Dónde está el código fuente
#   - Dónde están los reportes de cobertura
#   - Qué archivos ignorar del análisis

# Identificación del proyecto en SonarCloud
sonar.projectKey=Marcwos_registro-bet
sonar.organization=marcwos

# Nombre mostrado en el dashboard de SonarCloud
sonar.projectName=registro-bet

# ─── Dónde buscar el código fuente ─────────────────────────
sonar.sources=backend/src

# ─── Dónde buscar los tests ────────────────────────────────
sonar.tests=backend/src/apps/users/tests
sonar.test.inclusions=**/tests/**/*.py

# ─── Lenguaje y encoding ──────────────────────────────────
sonar.language=py
sonar.sourceEncoding=UTF-8

# ─── Reporte de cobertura ──────────────────────────────────
# SonarCloud lee este XML para mostrar % de cobertura
# Se genera con: pytest --cov --cov-report=xml
sonar.python.coverage.reportPaths=backend/coverage.xml

# ─── Exclusiones del análisis ──────────────────────────────
# No analizar migraciones, configuración, ni archivos de gestión
sonar.exclusions=\
  **/migrations/**,\
  **/manage.py,\
  **/config/**,\
  **/__pycache__/**,\
  **/tests/**,\
  **/__init__.py

# ─── Ignorar falsos positivos en tests ─────────────────────
# Los tests usan passwords e IPs falsos como datos de prueba,
# no son credenciales reales.

# Regla 1: Ignorar "hardcoded credentials" en archivos de test
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S105
sonar.issue.ignore.multicriteria.e1.resourceKey=**/tests/**/*.py

# Regla 2: Ignorar "hardcoded IP addresses" en archivos de test
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S1313
sonar.issue.ignore.multicriteria.e2.resourceKey=**/tests/**/*.py
